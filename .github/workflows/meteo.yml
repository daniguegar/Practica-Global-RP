name: Actualizar Datos Meteorológicos

on:
  schedule:
    - cron: '0 * * * *' # Se ejecuta cada hora
  workflow_dispatch:      # Permite ejecutarlo manualmente

jobs:
  actualizar_datos:
    runs-on: ubuntu-latest
    steps:
      # 1. Usamos la versión v4 para evitar el aviso de Node.js 20
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      # 2. Usamos la versión v5 para evitar el aviso de Node.js 20
      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3. INSTALACIÓN DE LIBRERÍAS (Esto es lo que falta y da el Error 1)
      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests lxml

      # 4. Ejecutar tu script
      # ... pasos anteriores ...
      - name: Ejecutar script de Python
        run: python scraper.py  # <--- Asegúrate de que ponga esto

      # 5. Guardar los cambios en el historico.txt de vuelta a GitHub
      - name: Commit y Push de los cambios
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add historico.txt
          git commit -m "Actualización automática: $(date)" || echo "No hay cambios para subir"
          git push
